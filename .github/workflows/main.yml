name: First Workflow

on: 
  push:


jobs:
  build-test:
       runs-on: ubuntu-latest


       steps:
        - name: Checkout Code
          uses:  actions/checkout@v6.0.2
           
        - name: Setup .NET
          uses: action/setup-dotnet@v4
          with:
              dotnet-version: '10.0.x'
        - name: Build solution
          run: dotnet build --configuration Release --no-restore
